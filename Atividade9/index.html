<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Atividade 9</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <form id="form">
                <div class="input-field">
                    <label>Números (Ex 1 e 2):</label>
                    <input type="number" id="num1" required />
                    <input type="number" id="num2" required />
                    <input type="number" id="num3" required />
                </div>

                <div class="input-field">
                    <label>Palavra (Ex 3 - Palíndromo):</label>
                    <input type="text" id="palindromo" />
                </div>

                <div class="input-field">
                    <label>Palavra 1 (Ex 4):</label>
                    <input type="text" id="palavra1" />
                </div>

                <div class="input-field">
                    <label>Palavra 2 (Ex 4 - Subconjunto):</label>
                    <input type="text" id="palavra2" />
                </div>

                <div class="input-field">
                    <label>Data (Ex 5):</label>
                    <input type="date" id="data" />
                </div>

                <button type="submit">Testar</button>
            </form>

            <div class="tables">
                <table>
                    <thead>
                        <tr>
                            <th>Exercício</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1) Maior número</td>
                            <td id="res-max">-</td>
                        </tr>
                        <tr>
                            <td>2) Ordem crescente</td>
                            <td id="res-sort">-</td>
                        </tr>
                        <tr>
                            <td>3) É palíndromo?</td>
                            <td id="res-pal">-</td>
                        </tr>
                        <tr>
                            <td>4) É subconjunto?</td>
                            <td id="res-sub">-</td>
                        </tr>
                        <tr>
                            <td>5) Dia da semana</td>
                            <td id="res-date">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <script src="main.js"></script>
    </body>
</html>
