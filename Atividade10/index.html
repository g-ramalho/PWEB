<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Formas de criar objetos</title>
    </head>
    <body>
        <script>
            var aluno1 = new Object();

            aluno1.ra = "0030482413027";
            aluno1.nome = "Gabriel Henrique";
            console.log(`ra=${aluno1.ra} nome=${aluno1.nome}`);

            var aluno2 = {};
            aluno2.ra = 1234;
            aluno2["nome"] = "Ronaldo";
            console.log("ra=" + aluno2.ra + " nome=" + aluno2["nome"]);
            aluno2["email do aluno"] = "albertobalsam@gmail.com";
            console.log("Email do infeliz= " + aluno2["email do aluno"]);

            var aluno3 = {
                ra: "1234567890",
                nome: "Rivaldo",
            };
            console.log("ra=" + aluno3.ra + " nome= " + aluno3.nome);

            function Aluno(ra, nome) {
                this.ra = ra;
                this.nome = nome;
                this.MostraDados = function () {
                    return "ra=" + this.ra + " nome=" + this.nome;
                };
            }
            var aluno4 = new Aluno("123", "Jonas");
            console.log(aluno4.MostraDados());
            console.log(aluno4.nome);

            function Aluno2() {
                let ra;
                let nome;
                this.setRa = function (value) {
                    this.ra = value;
                };
                this.getRa = function () {
                    return this.ra;
                };
                this.setNome = function (value) {
                    this.nome = value;
                };
                this.getNome = function () {
                    return this.nome;
                };
            }

            var aluno6 = new Aluno2();
            aluno6.setNome("Nickolas");
            aluno6.setRa("99999");
            console.log("ra=" + aluno6.getRa() + " nome=" + aluno6.getNome());

            function AlunoADS() {
                let numLab;
                this.setnumLab = function (value) {
                    this.numLab = value;
                };
                this.getnumLab = function () {
                    return this.numLab;
                };
            }
            AlunoADS.prototype = new Aluno2();
            let aluno7 = new AlunoADS();
            aluno7.setNome("Alberto");
            aluno7.setRa("0202020");
            aluno7.setnumLab(8);
            console.log(
                `Ra= ${aluno7.getRa()} nome= ${aluno7.getNome()} numLab= ${aluno7.getnumLab()} `,
            );

            class Aluno1 {
                constructor() {
                    this._ra;
                    this._nome;
                }
                setNome(value) {
                    this._nome = value;
                }
                getNome() {
                    return this._nome;
                }
                setRa(value) {
                    this._ra = value;
                }
                getRa() {
                    return this._ra;
                }
            }
            var objAluno = new Aluno1();
            objAluno.setNome("Eduardo");
            objAluno.setRa("123");
            console.log(`Nome= ${objAluno.getNome()} Ra=${objAluno.getRa()}`);

            class AlunoADS1 extends Aluno1 {
                constructor() {
                    super();
                    this._numLab;
                }
                setNumLab(value) {
                    this._numLab = value;
                }
                getnumLab() {
                    return this._numLab;
                }
            }
            var objAlunoADS = new AlunoADS1();
            objAlunoADS.setNome("Paula Tejano");
            objAlunoADS.setRa("420420");
            objAlunoADS.setNumLab("7");
            console.log(
                `Nome= ${objAlunoADS.getNome()} ra=${objAlunoADS.getRa()} NumLab=${objAlunoADS.getnumLab()}`,
            );

            var obj1 = new Object();
            var obj2 = obj1;
            obj1.nome = "Dolly";
            console.log(obj2.nome);

            class ContaBancaria {
                #cpf; //Atributo privado

                constructor(nome, saldoInicial) {
                    this.nome = nome;
                    this.saldo = saldoInicial;
                }

                setCpf(value) {
                    this.cpf = value;
                }
                getCpf() {
                    return this.cpf;
                }
                getSaldo() {
                    return this.saldoInicial;
                }

                depositar(valor) {
                    this.saldo += valor;
                    this.#registrarTransacao(valor); //metodo privado
                }

                #registrarTransacao(valor) {
                    console.log(`Depósito de R$ ${valor} realizado.
            Saldo R$ ${this.saldo} para
            CPF ${this.getCpf()} ou ${this.#cpf}`);
                }
            }
            const conta = new ContaBancaria("Gustavo", 1001);
            conta.setCpf(912);
            conta.depositar(50);

            const arr = [
                ["codigo", 3],
                ["nome", "Roberto"],
                ["idade", 78],
            ];

            const obj = Object.fromEntries(arr);
            console.log(obj);
            console.log(obj.nome);
            console.log(JSON.stringify(obj));
            //converte em json para a informação chegar pronta para o objeto

            const objEmpresa = {
                empresa: "Uber do Brasil",
            };
            const funcionario = Object.create(objEmpresa, {
                nome: { value: "Jorge" },
                endereco: { value: "Av. São Paulo" },
            });

            console.log(funcionario.empresa);
            console.log(funcionario.nome);
            console.log(funcionario.endereco);

            const objNovaEmpresa = {
                empresa: "New Car Lava Rapido",
            };
            const objVeiculo = {
                placa: "ABC-0912",
            };
            const motorista = Object.assign(
                { cpf: "091" },
                objNovaEmpresa,
                objVeiculo,
            );
            console.log(motorista);
        </script>
    </body>
</html>
