<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Operações Matemáticas</title>
    </head>
    <body>
        <div class="container">
            <h2>Calculadora de Operações</h2>

            <label for="num1">Primeiro Número:</label>
            <input
                type="number"
                id="num1"
                placeholder="Digite o 1º número"
                step="any"
            />

            <label for="num2">Segundo Número:</label>
            <input
                type="number"
                id="num2"
                placeholder="Digite o 2º número"
                step="any"
            />

            <button onclick="calcularOperacoes()">Calcular</button>

            <h3>Resultados:</h3>
            <div id="resultados"></div>
        </div>

        <script src="Operacoes.js"></script>
    </body>
</html>
