<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Classes</title>
        <script src="script.js" defer></script>
        <style>
            .account-display {
                border: 1px solid #ccc;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <section>
            <h1>Classes no JavaScript</h1>
            <form>
                <h2>Cálculo de Área do Retângulo</h2>
                <label>
                    "Digite a base do retângulo"
                    <input id="base" type="number" />
                </label>
                <label>
                    "Digite a altura do retângulo"
                    <input id="altura" type="number" />
                </label>
                <button id="btn_area" type="button">Calcular Área</button>
            </form>
            <div id="area_result"></div>

            <hr />

            <form>
                <h2>Contas (Corrente e Poupança)</h2>
                <label>
                    Nome do Correntista:
                    <input id="nome" type="text" /> </label
                ><br />
                <label>
                    Banco:
                    <input id="banco" type="text" /> </label
                ><br />
                <label>
                    Número da Conta:
                    <input id="numero" type="text" /> </label
                ><br />
                <label>
                    Saldo:
                    <input id="saldo" type="number" /> </label
                ><br />
                <label>
                    Saldo Especial (Conta Corrente):
                    <input id="saldo_especial" type="number" /> </label
                ><br />
                <label>
                    Juros (Conta Poupança):
                    <input id="juros" type="number" /> </label
                ><br />
                <button id="btn_conta" type="button">Criar Contas</button>
            </form>
            <div id="conta_result"></div>
        </section>
    </body>
</html>
